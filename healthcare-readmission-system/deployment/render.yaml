# Render Blueprint — Healthcare Readmission System
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: healthcare-readmission-api
    runtime: python
    plan: free
    rootDir: healthcare-readmission-system
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: DATABASE_URL
        fromDatabase:
          name: healthcare-readmission-db
          property: connectionString

  - type: web
    name: healthcare-readmission-ui
    runtime: static
    plan: free
    rootDir: healthcare-readmission-system/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://healthcare-readmission-api.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: healthcare-readmission-db
    plan: free
    databaseName: healthcare_readmission
    user: healthcare_user
